# Generated by swiftdeploy init - DO NOT EDIT MANUALLY

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  app_logs:
    driver: local

services:

  service:
    image: 10johnny-swiftdeploy-stage4b:latest
    restart: unless-stopped
    environment:
      MODE: "stable"
      APP_VERSION: "1.0.0"
      APP_PORT: "3000"
    networks:
      - swiftdeploy-net
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - swiftdeploy-net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_logs:/var/log/nginx
    depends_on:
      service:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  opa:
    image: openpolicyagent/opa:latest
    command:
      - "run"
      - "--server"
      - "--addr"
      - "0.0.0.0:8181"
      - "/policies"
    ports:
      - "127.0.0.1:8181:8181"
    volumes:
      - ./policies:/policies:ro
    networks:
      - swiftdeploy-net
    security_opt:
      - no-new-privileges:true