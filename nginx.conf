# Generated by swiftdeploy init - DO NOT EDIT MANUALLY

log_format swiftdeploy_fmt '$time_iso8601 | $status | ${request_time}s | $upstream_addr | $request';

upstream service_backend {
    server service:3000;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    access_log  /var/log/nginx/access.log swiftdeploy_fmt;
    error_log   /var/log/nginx/error.log warn;

    proxy_connect_timeout 30s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    add_header X-Deployed-By swiftdeploy always;

    location / {
        proxy_pass         http://service_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_pass_header  X-Mode;
    }

    error_page 502 = @err_502;
    error_page 503 = @err_503;
    error_page 504 = @err_504;

    location @err_502 {
        default_type application/json;
        add_header X-Deployed-By swiftdeploy always;
        return 502 '{"error":"Bad Gateway","code":502,"service":"swift-deploy-1-node:latest","contact":"ops@swiftdeploy.io"}';
    }

    location @err_503 {
        default_type application/json;
        add_header X-Deployed-By swiftdeploy always;
        return 503 '{"error":"Service Unavailable","code":503,"service":"swift-deploy-1-node:latest","contact":"ops@swiftdeploy.io"}';
    }

    location @err_504 {
        default_type application/json;
        add_header X-Deployed-By swiftdeploy always;
        return 504 '{"error":"Gateway Timeout","code":504,"service":"swift-deploy-1-node:latest","contact":"ops@swiftdeploy.io"}';
    }
}